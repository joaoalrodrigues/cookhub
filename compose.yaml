version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cookhub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cookhub
    ports:
      - "5432:5432"
    volumes:
      - cookhub_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  cookhub_pgdata:
